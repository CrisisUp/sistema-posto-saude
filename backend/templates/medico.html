<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultório Médico - Painel de Atendimento</title>
    <link rel="stylesheet" href="/static/css/medico.css">
</head>
<body>

    <header>
        <h1 id="tituloConsultorio">Clínico Geral - Consultório 1</h1>
        <span style="color: #2ecc71; font-weight: bold;">● Online</span>
    </header>

    <div class="conteudo">
        <div class="card-atual">
            <div class="paciente-info" id="blocoPaciente">
                <p style="color: #999;">Paciente da Vez:</p>
                <h2 id="nomePaciente">Nenhum paciente chamado</h2>
                <p id="docPaciente">CPF/SUS: --</p>
                <p id="maePaciente">Mãe: --</p>
                <p id="idadePaciente">Idade: --</p>
                <span id="gravidadePaciente" class="badge-gravidade" style="display:none;"></span>
            </div>

            <div class="acoes-container">
                <button id="btnChamar" type="button" class="btn btn-chamar" onclick="chamarProximo()">CHAMAR PRÓXIMO</button>
                <button id="btnIniciar" class="btn btn-iniciar desativado" onclick="alterarStatus('INICIAR')">INICIAR ATENDIMENTO</button>
                <button id="btnAusente" class="btn btn-ausente desativado" onclick="alterarStatus('AUSENTE')">NÃO COMPARECEU (AUSENTE)</button>
                <button id="btnFinalizar" class="btn btn-finalizar desativado" onclick="alterarStatus('FINALIZAR')">CONCLUIR ATENDIMENTO</button>
            </div>
        </div>
    </div>

    <script src="/static/js/medico.js"></script>
</body>
</html>
